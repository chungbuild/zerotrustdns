name: Update blocklists
on:
  schedule:
    - cron: "0 3 * * *"  # Tự chạy mỗi ngày lúc 3am
  workflow_dispatch:
    inputs:
      mode:
        description: "Chọn chế độ"
        required: true
        default: "update"
        type: choice
        options:
          - update
          - delete

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install && node index.js ${{ github.event.inputs.mode == 'delete' && '--delete' || '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
